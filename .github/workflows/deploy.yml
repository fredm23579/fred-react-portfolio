name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
      # Also run from the active development branch so the site is live
      # before the PR is merged into main.
      - 'claude/**'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build

      # Creates / force-pushes the gh-pages branch from dist/.
      # Uses GITHUB_TOKEN (full repo write access inside Actions) —
      # not affected by the local proxy restriction on direct pushes.
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
